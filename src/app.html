<!doctype html>
<html lang="en" data-theme="light" data-route-family="pending">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="text-scale" content="scale" />
		<meta name="color-scheme" content="light dark" />
		<meta name="theme-color" content="#f7f7ee" media="(prefers-color-scheme: light)" />
		<meta name="theme-color" content="#1b1a12" media="(prefers-color-scheme: dark)" />
		<meta
			name="description"
			content="memenow — make AI your partner. A studio in Lewes, Delaware building AI you can audit and return to. The first is Yinyang."
		/>
		<meta property="og:type" content="website" />
		<meta property="og:title" content="memenow" />
		<meta property="og:description" content="Make AI your partner." />
		<meta name="twitter:card" content="summary_large_image" />
		<!-- og:image and twitter:image are intentionally set per route in each
		     page's <svelte:head>; a global fallback would emit twice in SSR HTML
		     because <svelte:head> does not de-duplicate identical `property`s. -->

		<link rel="icon" href="/favicon.ico" sizes="any" />
		<link rel="icon" type="image/png" sizes="32x32" href="/brand/app-icon-32.png" />
		<link rel="icon" type="image/png" sizes="16x16" href="/brand/app-icon-16.png" />
		<link rel="apple-touch-icon" sizes="180x180" href="/brand/app-icon-180.png" />
		<link rel="manifest" href="/brand/site.webmanifest" />
		<script>
			(function () {
				try {
					var stored = localStorage.getItem('memenow.theme');
					var theme =
						stored === 'light' || stored === 'dark'
							? stored
							: window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
								? 'dark'
								: 'light';
					document.documentElement.setAttribute('data-theme', theme);
				} catch (_e) {
					// Ignore storage failures (private mode, etc).
				}
			})();
		</script>
		<!-- Motion-preference boot. Unlike data-theme, <html> ships NO static
		     data-motion: its absence is exactly what lets the CSS
		     `:root:not([data-motion])` fallback honor the OS prefers-reduced-motion
		     query when scripting is off. With scripting on, this writes the attribute
		     (stored choice, else the OS setting) before first paint, and from then on
		     the attribute is the single source of truth (see tokens.css + motion.ts). -->
		<script>
			(function () {
				try {
					var stored = localStorage.getItem('memenow.motion');
					var motion =
						stored === 'full' || stored === 'reduced'
							? stored
							: window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches
								? 'reduced'
								: 'full';
					document.documentElement.setAttribute('data-motion', motion);
				} catch (_e) {
					// Ignore storage failures (private mode, etc).
				}
			})();
		</script>
		<script type="application/ld+json">
			{
				"@context": "https://schema.org",
				"@graph": [
					{
						"@type": "Organization",
						"@id": "https://memenow.xyz/#organization",
						"name": "memenow",
						"url": "https://memenow.xyz",
						"logo": "https://memenow.xyz/brand/mark.png",
						"sameAs": ["https://github.com/memenow"]
					},
					{
						"@type": "WebSite",
						"@id": "https://memenow.xyz/#website",
						"url": "https://memenow.xyz",
						"name": "memenow",
						"publisher": { "@id": "https://memenow.xyz/#organization" }
					}
				]
			}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
