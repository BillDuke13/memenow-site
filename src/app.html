<!doctype html>
<html lang="en" data-theme="light" data-route-family="pending">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<meta name="color-scheme" content="light dark" />
		<meta name="theme-color" content="#f7f7ee" media="(prefers-color-scheme: light)" />
		<meta name="theme-color" content="#1b1a12" media="(prefers-color-scheme: dark)" />
		<meta
			name="description"
			content="memenow — make AI your partner. A studio in Lewes, Delaware building agents for clarity in life and discipline in markets."
		/>
		<meta property="og:type" content="website" />
		<meta property="og:title" content="memenow" />
		<meta property="og:description" content="Make AI your partner." />
		<meta property="og:image" content="/og/og-default.jpeg" />
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:image" content="/og/og-default.jpeg" />
		<link rel="icon" href="/favicon.ico" sizes="any" />
		<link rel="icon" type="image/png" sizes="32x32" href="/brand/app-icon-32.png" />
		<link rel="icon" type="image/png" sizes="16x16" href="/brand/app-icon-16.png" />
		<link rel="apple-touch-icon" sizes="180x180" href="/brand/app-icon-180.png" />
		<link rel="manifest" href="/brand/site.webmanifest" />
		<script>
			(function () {
				try {
					var stored = localStorage.getItem('memenow.theme');
					var theme =
						stored === 'light' || stored === 'dark'
							? stored
							: window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
								? 'dark'
								: 'light';
					document.documentElement.setAttribute('data-theme', theme);
				} catch (_e) {
					// Ignore storage failures (private mode, etc).
				}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
